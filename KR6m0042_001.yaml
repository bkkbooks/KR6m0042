body:
  text: 姑蘇堯峯蘭若沙門遵式排定將釋此論科文分四一教起因緣將釋二藏教所攝二藏三宗趣總別三宗四隨文釋義三初總標題目肇論二作者示名後秦三正釋本文二初一立義標宗二初標義題宗本次正立義二初總立義本三初列名本無二立義一義三推釋二先推何則二釋二初指事釋緣會二一指所詮事一切二釋能詮名緣會二顯理明一義四一顯性空理二一推窮其性三一推前際空緣會二推後際空二一正推緣離二縱推如其三正推現空以此二結顯性空性常二顯法性理法性三顯實相理故曰四顯本無理相二別開義門三初約境雙破有無顯一義二一假牒問言不二辨諦理二初明二諦二一出教意以釋問不如二立縱奪以會前若以二會一義二初會二諦顯一義二一正顯遮照夫不二述成遮照然則二會三乘顯一乘三初總標人法三乘二釋成所觀二初正釋性空二辨邪正見法三重通妨難二一牒難縱破設二二權實對辨是以二約智雙融權實顯一義三一牒問略釋漚和二返覆廣釋三一明互具釋大慧諸法二約二門釋二名然則三返覆釋成一義涉有三結成心觀是謂三約證雙泯理事顯一義三一標華梵以牒問泥洹二就盡諦以釋成直結三顯一實異三乘無復後四依宗造論後四依宗造論分三初前二論明真俗不二顯境一二初物不遷論立俗諦二初題目物不二論文二初序意四初標物示人情夫生二據理申己解三一據理推意余則二引經標牒放光三推釋正理尋夫三明情解相違四初總標解惑然則二示理難言所以三推釋其意何者四躡前起後緣使四顯立論之意然不二正論三初正顯不遷三初引教定宗二初引經論道行次定宗旨斯皆二破惑顯理二初解惑對辨二初境同見異夫人二逆順結責然則二遣惑顯理五初嗟迷執傷夫二陳迷情既知三顯正理四一標往物二推何則三釋二初釋上句求向次釋下句覆而四結是謂四引儒典二初正引故仲二結成如此五責惑情既無三舉事結顯然則次會釋教意二初引教詰難二初人法雙標二一約教理立難噫聖二約行果定難是以二牒前正難苟萬二就理釋通二初歎無常教理幽深覆尋二明常無常幽深教理三初明教異意同二一就本教顯異同三初明執殊教異二初明異是以二責異豈曰二證教異意同故成三述成不二是以二寄外教顯異同二初舉此方儒道説動以顯靜然則二舉西土鄰人説常顯無常四一標正意是以二推常執何者三引彼文是以四顯無常所謂二顯教權意實五初雙標教意是以二雙明攝實故談三責執教情而徵四遣無常見是以五結成不二然則三宗教顯不遷四初宗教顯意是以二引證幽深故經三推釋動靜何者四結示不遷然則三因果結益二初就果推因六初正明是以二引喻成山三結成果以四引證故經五徵釋何者六結責復何二舉事結顯然則二不真空論顯即真次第三論明體用不二顯智一後第四論明理智不二顯證一二不真空論顯即真分二初題目不真二論文二初敘立意三初明理深難悟四初標宗顯妙夫至二約智歎深二初逆敘智能自非二順明智用二初明智體照用是以二釋照用之能是以三結事不真如此四述前生後然則二敘異見迷宗二初標興由故頃二伸破立二初推何則二釋三初破心無義二初敘計心無二正破此得二破即色義三初敘情計即色二明解異夫言三正結破此直三破本無義四初敘情計本無二示正義尋夫三責異見何必四斥謬計此直三述意謙陳三初敘名物不相到夫以二顯至理絶言思然則三謙陳擬述意然不二正立論三初通論諸法直顯即真三初引教標宗摩訶次推釋宗義二初明即俗之真三初反覆推釋三初牒前尋夫二反推豈謂三順釋誠以二就俗結顯如此三引經證成故經二明真俗不二三初引經標異故放二釋成不二夫有三引證不二故經三述成正理四初述成然則二引證故意三推釋何者四結成然則二別開色心因緣推釋三初引教重標故道二再推宗義五初敘意牒前尋理二推釋所以二初推釋不有所以二推釋不無不無三引大論證故摩四反覆釋成尋此五總結玄旨此事三復述正理三初正述然則二推釋何則三結成然則三推窮名實結責迷情三初引經標義故放二正推名體四初名體互求夫以二雙結同空是以三推立名因三初引文陳惑故中二結指惑情然則三舉名結例既悟四引文證成是以三約證結顯三初舉人顯證是以二引證即真故經三雙結玄旨然則第二明體用不二顯智一文二初論文二初題目般若二本文二三序意三初標宗陳惑夫般二序聞悟由三初師教東來三初標名歎德有天二美其來由將爰三流通年數弘始二秦王垂護二初標號歎德大秦二翻譯兩揚時乃三預座聞悟余以三讚深謙述然則二正論二初標宗正顯四初標具用之體三初引經標體放光二約體辨用二初牒經問用此辨二即體顯用三初正答果有二推釋何者三引證故經三會用歸體是以二明即體之用五初明權實同體然則二顯一體同虗神無三述成二用智雖四顯即體所以所以五結成二用斯則三體用合明四初標指然其二推釋何者三引經故寶四結不二所以四境智結會二初結境智權實是以二結權實同體斯則二問答推析九初體用問答二初知會有無難二初牒用難體二初敘難難曰二正難既知二縱奪重難若夫二體用同時答三初正答前難二初答體用難二初正答答曰二責非豈曰二答縱奪難四初敘計子意二斥非無乃三徵釋何者四結責豈待二躡迹斷疑二初破疑執二初斷有知性空疑二初牒疑若有二正斷二初比破則不二奪破有何二以境歎智疑二初牒疑若以二正斷二初敘定所知二奪破亦無二釋正義二初釋前經義然經二重顯體用豈唯三結顯正義二初結顯前義是以二明前所以所以二名實問答二初兩名求實問二初泛陳名實難曰二牒文正難三初牒前名異而論二敘欲一意二初自意意謂二論意然論三兩關正難何者二雙拂顯玄答三初拂迹雙泯答曰二釋妨述意言雖三正顯玄旨三初顯體用玄微夫聖二釋知無知意是以三結不二深旨是以三境智問答二初以境求知難三初泛敘難端難曰二引經成立故經三結難有知以緣二心境同無答三初以理正答三初正答答曰二推釋何者三結顯般若二簡辨真妄四初總標境智夫知二真妄對辨相與三結示起由二初正示是以二徵釋何者四釋成所以二初牒所以所以二釋成二初釋妄二初正釋夫所二引證故中二釋真三初標不從二釋今真三引經故經三結答前問三初述成無知是以二釋妨除疑然智三結難非真而子四兩關問答二初不取違知難二初牒論敘難難曰二兩關正難若無二知即不取答二初雙非有無答曰二正答不二知則五是當問答二初無當違有難二初牒論敘難難曰二以無難有誰當二有無雙融答三初領問答曰二正答夫無三引證故經六取捨問答二初捨有滯無難三初呈解立難難曰二引經成立是以三正難滯無若以二取捨俱離答二初直非所難二初正破答曰二推釋何者二顯示正義二初示正義是以二出所以所以七應會問答二初無知生滅問二初牒前敘難難曰二正難問然則二用無生滅答四初真妄對明答曰二釋妨正答然非三舉喻結答是以四結非所問斯不八真妄問答二初惑智同真問二初呈解難曰二疑問俱無二真妄同異答三初總標答曰二釋真妄二初推釋何者二結會無知三釋同異三初正明二初顯體同用異是以二述成不二是以二推釋二初雙徵何者二各釋二初釋不可同內有二釋不可異內雖三引證三初證辨同於異是以二證辨異於同故經三證同異不二又云九寂用問答二初寂用何異難二初牒論難曰二正問未詳二用寂同時答二初正答同時答曰二結會權實三初結義歸前是以二引文為證故成三總結文意斯則二答外問初論文竟二答外問分二初問二初上書致意劉公二正致疑問三初牒疑文論序二陳疑問二初通致問二初敘所疑二初總夫聖二別是以二陳能疑斯理二別致問二初呈疑但今二致問三初體用必有何無問三初敘述疑意二初敘體為謂二敘用為將二牒問體用二初難體屬定慧若窮二難用當息應若心三牒上請答夫心二照用空有不同問四初呈疑疑者二引論而論三正難二初開兩關謂宣二明互違若覩四請答意有三是當是非悟惑問四初牒前論論云二敘所解夫無三致疑問二初是非問豈有二悟惑問若謂四求示誨問論三總結問二初敘宗乘結問論至二敘同友結問頃兼二釋答二釋答文二初回書敘答法師二答所問三初總答疑意二初略牒所問疏云二勸令證悟以此二別答三問三初體用不二真常答四初正明體用答二初牒問疏曰二正答二初雙非顯不二意謂二推釋明體用二初推何者二釋二初釋體夫聖二釋用又聖二揀異斷常答四初對妄顯真且夫二推釋真妄二初總推何者二別釋二初釋妄心夫有二釋真心二初明即妄之真有無二顯即體二用二初正明體用夫無二結用歸體因謂三引經證成故經四結顯不二此無三責問非真答四初泛敘迷真二初敘迷情而今二明執教是以二推釋玄旨二初推何者二釋三初標真境萬物二示迷悟不可三明智照是以三引經證成故經四結責情執此攀四返詰玄旨答二初推有無二初標意請詰二推詰三初求有不成夫智二推無不是世稱三顯非有無且無二顯玄旨三初引經標玄故經二推釋玄旨何則三結勸尋玄是以二照用空有同時答二初略牒前問又云二正答所疑二初直敘疑情答三初敘問乖真談者二示其正義四初引經立義經云二悟惑對釋二初敘迷情若如二示正義是以三結顯所以故知四會通前義是以三結責所問以此二就解推破答三初敘錯解恐談二勸探玄若能三責所執聖心三雙非是當悟惑答四初牒前領問又云二縱奪而答二初縱其所悟若能二奪其所執二初正明但恐二徵釋何者三顯示正義是以四結責非問乃曰三結勸探玄三結勸探玄文三初言迹迷悟二初明迷則生執夫言二顯了則造玄而言二舉善達人是以三結顯玄微至理第三明理智不二顯證一分二初表文二初表題上涅二表文三初總歎王德僧肇二敘述宗由四初歎至理深玄涅槃二敘重恩謙感二初敘恩感遇肇以二謙力寡微肇才三歎秦王明悟而陛四序答旨幽深二初正明一日二美歎斯乃三奏聞作意二初明作意二初暫前義幽深然聖二助末章高判二初敘判斥之義論末二伸述作之懷今演二乞指授若少二論文二初題目涅槃二本文二初標章九折二正論三初一章開宗定義二初章名開宗二本文二初陳宗序意二初陳宗二初引經總標無名二依經釋義三初翻名釋涅槃秦言二就理釋無名斯蓋三約應顯假名而曰二序意余嘗二立義推宗三初標宗敘義三初明體超數表夫涅二明比量難求然則三示現量所以所以二引教推窮二初引教明深經云二推窮顯妙二初總釋尋夫二推釋何者三結示深玄三初結難測然則二結平等恬焉三結超情斯乃次十八章問答推窮後一節總結大意次十八章問答推窮大分為三初三就真應明等解三初真應異同辨二初敘應疑真問二初章名核體二正問二初序問有名二立問三初陳有餘相二初牒名述相三初牒名有餘二述相五初果德已圓相謂如二因行已滿相積萬三利他益物相啓八四二智常行相窮化五將欲示寂相將絶三結名此有二引經證成經云二陳無餘相二初牒名述相三初牒名無餘二述相二初總陳謂至二別陳四初徵釋所因何則二引證因起經曰三正明滅相所以四引喻以況其猶三結名此無三雙結正難二初雙結有無然則二牒前正難四初牒前難而曰二舉喻難無異三詰責難子徒四結無益靜思二真應異同答二初章名位體二正答三初敘難非真二初翻前疑二初破前疑無名二遣前執而存二示真應二初明應化非真難序二示正觀真體子獨二正明位體三初標宗顯義二初標宗三初引經放光二釋意然則三喻釋譬猶二顯義三初約化體名相顯二初即名顯義其為二即相顯義是以二約化用施為顯其為三結成然則二結責惑情而惑三述意顯解三初述解意意謂二徵釋何則三結定然則三結責乖旨三初牒前非理子乃二以理推破三初引經立理經曰二釋成正理萬機三結破有無二初破有然則二破無所以三結責述情三初責有而惑二責無欲以三結責豈謂二有無即離辨三兩亦雙非辨次四對三乘顯等行後二就人法示等證二有無即離辨分二初有無難出問二初章名徵出二正問二初泛敘難端二初泛敘有名二引證經云二正伸難意三初引經標指又稱二推求出意而論三結責非理而曰二雙超不離答二初章名超境二正答二初破泛難三初縱奪破無名二引經破三初引經經曰二推釋何則二結非然則三結責此乃二答正難三初明前章意是以二正顯超境庶悕三示前經意經曰三兩亦雙非辨二初雙非即離問二初章名搜玄二正問三初牒前敘疑有名二重述疑意然復三搜求玄旨其道二即離同時答二初章名妙存二正答四初顯超言念三初敘名相有無無名二陳涅槃超絶二初引經經曰二陳意吾何三明傍言顯旨雖然二正示妙存三初引經標宗淨名二釋經玄旨然則三重徵再釋何則三述成真旨然則四結責前非豈容次四對三乘明等行文二初通對三乘行三初對三會一二初解一疑三問二初章名難差二本文三初牒前法一有名二別敘人三二初通疑三乘而放二別疑菩薩佛言三以一難三若涅二開一成三答二初章名辨差二正答三初領前法一無名二開顯三乘二初開一為三二初引經顯法華二引喻指三車二開三為一以俱三答前所問四初牒前正答而難二引經證答二初引經故放二立喻請以三敘根行答二初正敘有差夫以二釋成無差所以四結會衆經然則二推三得一二初一異無三問二初章名責異二正問三初法喻定難有名二正陳疑難二初開兩關請問二立二問二初難同若我二難異若我三結三乘無由然則二人法一異答二初章名會異初正答五初正答問無名二舉喻答譬猶三法合答如是四釋所以所以五結答意無為三就一明三二初法同人異問二初章名詰漸二正問三初明斷證同二初泛陳迷悟有名二正敘所同三初智同二乘二斷同是時三證同結縛二引證同義經曰三正詰漸次不體二就法顯人答二初章名明漸二正答三初領前法一無名二責前人同結是三正答漸次四初法喻正答二初引喻經曰二法合三乘二校二乘智量夫群三引外書明漸書不四引經結智用經喻二對菩薩二初一乘諸位問二初章名譏動二正問三初牒經動寂有名二以動難寂夫進三結成相違此文二位位寂滅答二初章名動二正答四初顯所修之行三初引經總標無名二釋成大意無為三結示所以所以二明能修之心五初引經標義道行二釋經大意不有三逆順推釋二初問何者二釋二初反釋責非有心二順釋正理是以四結成所以所以五引經證義經曰三引前結示三初正引二初引前經儒童二引別經又空二結成然則三廣示是以四責非玄悟二初責其所執聖旨二斥其非喻而以後就人法示等證二初明人法同異二初先後窮源問二初章名窮源二正問二初先人後法過有名二先法後人過而經二平等同時答二初章名通古二正答三初明人法不異三初正明無名二推釋何則三引釋三初釋智由理起故天二釋理由智顯又曰三釋理智不二斯則二顯妙契即真三初正顯所以二引證經曰三結成以知三結非先後二初正結進之二引證天女二明得法有無二初有無乖得問二初章名考得二正問二初引經雙立問有名二得失俱非問二初住有不能證然則二離有無能證果若二即事玄證答二初章名玄得二正答二初揀辨真偽無名二正明玄得三初定宗義本且談二推求語本何時三引經廣釋二初明不二二初釋理無得為涅槃果三初明不即離經曰二顯不生滅維摩三結成理果然則二釋智無得為菩提果三初遣有無放光二明玄得是義三結智果是故二顯不二四初結前不二無所二述成真體然則三結體顯用故能四引證體用故梵次問答推窮竟後總結大意然則注肇論疏科文終

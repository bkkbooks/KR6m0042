body:
  text: 肇論疏序科文泐潭禪師曉月治定釋此論序科文分二初明作論元由六一標舉論名慧達二稱美人法但末三慶幸遭逢達猥四排斥譏嫌世諺五申述元情夫神六宣明序意達留後序論之宗旨四一序次第夫大二遣相雖以三稱歎余謂四簡別是非但宗
